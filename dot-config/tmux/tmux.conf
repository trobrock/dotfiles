# set leader to Ctrl-a
set -g prefix C-a

# reload tmux config
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded"

# rename current window
bind -n C-r command-prompt "rename-window '%%'"

# enable mouse
set -g mouse on

# renumber windows when one is closed
set-option -g renumber-windows on

# use vim keys
setw -g mode-keys vi

# # True color settings
set -g default-terminal "$TERM"
set -ag terminal-overrides ",$TERM:Tc"

# pass through modified Enter / function keys (Shift+Enter, etc.) so apps like Claude Code can distinguish them
set -g extended-keys on
set -s extended-keys-format csi-u

# tokyo night config
set -g @tokyo-night-tmux_show_battery_widget 0
set -g status-position top

# disable automatic window renaming
set -g automatic-rename off

# Refresh tmux's session environment from the attaching SSH client. This keeps
# new panes pointed at the current forwarded ssh-agent socket after reconnects.
set -g update-environment "DISPLAY KRB5CCNAME SSH_ASKPASS SSH_AUTH_SOCK SSH_AGENT_PID SSH_CONNECTION WINDOWID XAUTHORITY"

# window splits | for vertical, - for horizontal (30% height), _ for horizontal (50/50), c for tab
bind | split-window -h -l 30% -c "#{pane_current_path}"
bind - split-window -v -l 30% -c "#{pane_current_path}"
bind _ split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# add clear screen binding, since tmux-navigator uses Ctrl-l
bind C-l send-keys 'C-l'

# resize panes
bind-key -r -T prefix Up resize-pane -U
bind-key -r -T prefix Down resize-pane -D
bind-key -r -T prefix Left resize-pane -L
bind-key -r -T prefix Right resize-pane -R

# switch to last window with Ctrl-a Ctrl-a
bind-key C-a last-window

# git binding
bind-key -n C-g display-popup -E -d '#{pane_current_path}' -w 90% -h 90% lazygit

# developerly bindings (only when the CLI is installed)
if-shell 'command -v developerly >/dev/null 2>&1' {
  bind-key -n C-o display-popup -E -d '#{pane_current_path}' -w 90% -h 90% "developerly tui"
  bind-key -n C-t display-popup -E -d '#{pane_current_path}' -w 90% -h 80% "developerly tui --quickstart"
  bind-key a run-shell "developerly tasks next-awaiting --client '#{client_name}' --current-session '#S'"
}

# Prevent tmux-sensible from setting default-command to reattach-to-user-namespace
# (no longer needed on modern macOS, and it causes window names to show "reattach-to-user-namespace")
set-option -g default-command "$SHELL"

# ============================================================================
# MINIMAL CATPPUCCIN MOCHA THEME
# ============================================================================

# Catppuccin Mocha colors
# Background: #1e1e2e (base)
# Surface: #313244 (surface0)
# Overlay: #6c7086 (overlay0)
# Text: #cdd6f4 (text)
# Accent: #cba6f7 (mauve)
# Green: #a6e3a1 (green)
# Blue: #89b4fa (blue)

# Status bar with transparent background
set -g status-style 'bg=default,fg=#cdd6f4'
set -g status-left-length 60
set -g status-right-length 140
set -g status-interval 5

# Window status colors
set -g window-status-current-style 'bg=#313244,fg=#cba6f7,bold'
set -g window-status-style 'bg=default,fg=#6c7086'
set -g window-status-separator ''

# Pane border colors
set -g pane-border-style 'fg=#313244'
set -g pane-active-border-style 'fg=#cba6f7'

# Message colors
set -g message-style 'bg=#313244,fg=#cdd6f4'
set -g message-command-style 'bg=#313244,fg=#cdd6f4'

# Status bar content with transparent sections
if-shell 'command -v developerly >/dev/null 2>&1' {
  set -g status-left '#{?@developerly_status_task,#{E:@developerly_status_task},developerly} '
  set -g status-right '#[bg=default]#(test -x "$HOME/.local/bin/codex-usage-bars" && "$HOME/.local/bin/codex-usage-bars") #(developerly usage show-compact)  #(developerly status) #[default]'
} {
  set -g status-left '#S '
  set -g status-right '#[bg=default]#(test -x "$HOME/.local/bin/codex-usage-bars" && "$HOME/.local/bin/codex-usage-bars") %Y-%m-%d %H:%M #[default]'
}

# Window status format - Enhanced styling with balanced active tab distinction
set -g window-status-format '#[bg=#181825,fg=#6c7086] #I #[fg=#9399b2]#W#{?window_zoomed_flag,  󰊓,} #[bg=default] '
set -g window-status-current-format '#[bg=#45475a,fg=#cba6f7,bold] #I #[bg=#45475a,fg=#cdd6f4,bold]#W#{?window_zoomed_flag,  󰊓,} #[bg=default] '

# Clock mode color
set -g clock-mode-colour '#cba6f7'

# Copy mode colors
set -g mode-style 'bg=#313244,fg=#cdd6f4'

# ============================================================================
# END THEME CONFIGURATION
# ============================================================================

# plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @sessionx-bind 'o'

# run TPM
run '~/.config/tmux/plugins/tpm/tpm'
