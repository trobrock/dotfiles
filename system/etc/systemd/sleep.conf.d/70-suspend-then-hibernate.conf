[Sleep]
AllowSuspendThenHibernate=yes
MemorySleepMode=s2idle
HibernateMode=platform

# Fast resume for short moves; safe battery life if it stays closed/off-power.
HibernateDelaySec=45min

# If the laptop is closed while plugged in, keep it suspended. The hibernate
# countdown starts once AC is disconnected.
HibernateOnACPower=no
